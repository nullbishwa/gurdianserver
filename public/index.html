<!DOCTYPE html>
<html>
<head>
  <title>Guardian Dashboard</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    body { font-family: Arial; background:#111; color:#fff; }
    button { margin:5px; padding:10px; }
    .box { border:1px solid #444; padding:10px; margin:10px; }
  </style>
</head>
<body>

<h2>🔥 Guardian Dashboard</h2>

<div class="box">
  <h3>Devices</h3>
  <ul id="devices"></ul>
</div>

<div class="box">
  <h3>Controls</h3>
  <input id="deviceId" placeholder="Device ID"/>
  <br>
  <button onclick="sendCmd('start_audio')">Start Audio</button>
  <button onclick="sendCmd('stop_audio')">Stop Audio</button>
</div>

<div class="box">
  <h3>Live Logs</h3>
  <div id="logs"></div>
</div>

<script>
const socket = io();

socket.emit("register_admin", "secret123");

const devicesEl = document.getElementById("devices");
const logsEl = document.getElementById("logs");

socket.on("device_list", (list) => {
  devicesEl.innerHTML = "";
  list.forEach(d => {
    const li = document.createElement("li");
    li.innerText = d;
    devicesEl.appendChild(li);
  });
});

socket.on("device_status", (data) => {
  log("STATUS: " + JSON.stringify(data));
});

socket.on("live_data", (data) => {
  log(JSON.stringify(data));
});

function sendCmd(cmd) {
  const id = document.getElementById("deviceId").value;

  socket.emit("send_command", {
    device_id: id,
    command: cmd
  });
}

function log(msg) {
  const p = document.createElement("p");
  p.innerText = msg;
  logsEl.prepend(p);
}
</script>

</body>
</html>
